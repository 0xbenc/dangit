name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * 1"

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf 'gofmt needed:\n%s\n' "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test race
        run: go test -race ./...

      - name: Smoke test version
        run: go run ./cmd/dangit version

      - name: Smoke test scan exit codes
        shell: bash
        env:
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_SYSTEM: /dev/null
          GIT_AUTHOR_NAME: ci
          GIT_AUTHOR_EMAIL: ci@dangit.local
          GIT_COMMITTER_NAME: ci
          GIT_COMMITTER_EMAIL: ci@dangit.local
          NO_COLOR: "1"
        run: |
          set -euo pipefail
          # Exercise the built binary, not `go run`: go run collapses any
          # non-zero program exit to 1, which would mask exit-code assertions.
          bin="$(mktemp -d)/dangit"
          go build -trimpath -o "$bin" ./cmd/dangit

          tmp="$(mktemp -d)"
          git -c init.defaultBranch=main init --bare -q "$tmp/origin.git"
          git -c init.defaultBranch=main clone -q "$tmp/origin.git" "$tmp/seed"
          echo hi > "$tmp/seed/a.txt"
          git -C "$tmp/seed" add -A
          git -C "$tmp/seed" commit -qm init
          git -C "$tmp/seed" push -q origin main
          mkdir -p "$tmp/work"
          git clone -q "$tmp/origin.git" "$tmp/work/repo"
          echo changed >> "$tmp/work/repo/a.txt"

          # Flagged tree exits 1.
          code=0
          "$bin" scan --json "$tmp/work" >/dev/null || code=$?
          if [ "$code" -ne 1 ]; then echo "expected exit 1, got $code"; exit 1; fi

          # Empty tree exits 0.
          mkdir -p "$tmp/empty"
          "$bin" scan "$tmp/empty"

          # Bad timeout exits 2.
          code=0
          "$bin" scan --timeout-secs nope 2>/dev/null || code=$?
          if [ "$code" -ne 2 ]; then echo "expected exit 2, got $code"; exit 1; fi

      - name: Build native binary
        run: go build -trimpath -o dangit ./cmd/dangit

  cross-build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -o "dist/dangit_${GOOS}_${GOARCH}" ./cmd/dangit

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  goreleaser-check:
    name: goreleaser check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate goreleaser config
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: v2.16.0
          args: check

  conformance:
    name: tui-conformance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Shared-UI drift guards
        shell: bash
        run: |
          fail=0
          # Footers must flow through termchrome.Footer — no hand-built " / " drift.
          if grep -rn '  /  ' internal; then
            echo "::error::hand-built '  /  ' footer separator — use termchrome.Footer([]termchrome.KeyHint{...})"; fail=1
          fi
          # Spinners must use termchrome.ResolveGlyphs — no inline frame literals.
          if grep -rnE "⠋|\[\]rune\{'\|'" internal cmd; then
            echo "::error::inline spinner frames — use termchrome.ResolveGlyphs"; fail=1
          fi
          # No golden-update flag is supported (inline-literal expectation model).
          if grep -rnE 'UPDATE_GOLDEN|flag\.[A-Za-z]+\("update"' internal; then
            echo "::error::no golden-update flag is supported; hand-edit inline expectations"; fail=1
          fi
          # No replace directive in the released module graph (pin shared modules).
          if grep -qE '^replace ' go.mod; then
            echo "::error::replace directive in go.mod — pin tagged shared-module versions"; fail=1
          fi
          if [ "$fail" = 0 ]; then echo "conformance OK"; fi
          exit $fail
