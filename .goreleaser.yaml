# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: dangit

before:
  hooks:
    - go mod verify

builds:
  - id: dangit
    main: ./cmd/dangit
    binary: dangit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.CommitDate}}

archives:
  - id: dangit
    ids:
      - dangit
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*
      - man/*

nfpms:
  - id: dangit
    ids:
      - dangit
    package_name: dangit
    vendor: 0xbenc
    homepage: https://github.com/0xbenc/dangit
    maintainer: Ben Chapman <info@offcourtcreations.com>
    description: Find git repos with unfinished work — uncommitted, unpushed, or behind.
    license: MIT
    formats:
      - deb
      - rpm
    dependencies:
      - git
    contents:
      - src: LICENSE
        dst: /usr/share/doc/dangit/LICENSE
      - src: completions/dangit.bash
        dst: /usr/share/bash-completion/completions/dangit
      - src: completions/dangit.zsh
        dst: /usr/share/zsh/site-functions/_dangit
      - src: completions/dangit.fish
        dst: /usr/share/fish/vendor_completions.d/dangit.fish
      - src: man/dangit.1
        dst: /usr/share/man/man1/dangit.1

homebrew_casks:
  - name: dangit
    ids:
      - dangit
    binaries:
      - dangit
    manpages:
      - man/dangit.1
    completions:
      bash: completions/dangit.bash
      zsh: completions/dangit.zsh
      fish: completions/dangit.fish
    homepage: https://github.com/0xbenc/dangit
    description: Find git repos with unfinished work — uncommitted, unpushed, or behind.
    repository:
      owner: 0xbenc
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: goreleaserbot@users.noreply.github.com

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  name_template: "dangit {{ .Tag }}"
